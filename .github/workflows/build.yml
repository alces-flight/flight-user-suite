on:
  push:
    branches: [main]
    tags: ["*"]
    paths-ignore: ['docs/**']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**']

permissions:
  contents: write

name: Build and test
jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5

    strategy:
      fail-fast: true
      matrix:
        go: ['1.26.x']
        os: [ubuntu-latest]
        # os: [ubuntu-latest, ubuntu-latest-arm]

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Go Tidy
        run: go mod tidy && git diff --exit-code
        working-directory: flight-core

      - name: Go Mod
        run: go mod download
        working-directory: flight-core

      - name: Go Mod Verify
        run: go mod verify
        working-directory: flight-core

      - name: Build
        run: make

      - name: Publish build tarball
        uses: actions/upload-artifact@v7
        with:
          path: flight-user-suite*.tar.gz
          archive: false

      - name: Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.ref_type == 'tag' }}
        with:
          files: |
            flight-user-suite*.tar.gz
          draft: true
          prerelease: true
          generate_release_notes: true
