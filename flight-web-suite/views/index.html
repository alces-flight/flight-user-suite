{{define "index"}}

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Flight Web Suite</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  </head>
  <body style="margin: 0; padding: 0; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column;">
    <div style="width: 100%; height: 3.6rem; background-color: black; padding: 0.5rem 0.75rem; box-sizing: border-box; border-bottom: solid 4px #2794d8;">
      <img
        src="/images/logo.png"
        alt="Flight Web Suite Logo"
        style="height: 100%; display: block;"
      >
    </div>
    <div style="flex: 1; overflow-y: auto; padding-inline: 15%; background-image: linear-gradient(#DCEEF5, white);">
      <div style="height: min-content; min-height: 100%; background-color: white; padding: 1rem; text-align: center;">
        <h1 style="font-weight: 400; color: #3D3D3D; margin-top: 5rem;">
          Welcome to the
          <span style="color: #2794d8;">{{.}}</span>
          compute environment.
        </h1>
      </div>
    </div>
  </body>
</html>

{{end}}
